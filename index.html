let activeFilter = 'all';

function setFilter(f, el) {
  activeFilter = f;
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  render();
}

function render() {
  const rawQ = document.getElementById('search').value;
  const words = rawQ.toLowerCase().trim().split(/\s+/).filter(Boolean);
  const sort = document.getElementById('sort-select').value;

  let filtered = ideas.filter(idea => {
    const matchFilter =
      activeFilter === 'all' ||
      (activeFilter === 'easy' && idea.d === 'easy') ||
      (activeFilter === 'medium-easy' && idea.d === 'medium-easy') ||
      (activeFilter === 'medium' && idea.d === 'medium') ||
      (activeFilter === 'ai' && idea.ai) ||
      (activeFilter === 'high-rpm' && idea.rpm === 'high') ||
      (activeFilter === 'free' && idea.tags.includes('free')) ||
      (activeFilter === 'money' && idea.tags.includes('money')) ||
      (activeFilter === 'security' && idea.tags.includes('security')) ||
      (activeFilter === 'productivity' && idea.tags.includes('productivity')) ||
      (activeFilter === 'dev' && idea.tags.includes('dev'));

    // All search words must appear somewhere in title + desc + tags
    const searchable = (idea.t + ' ' + idea.desc + ' ' + idea.tags.join(' ')).toLowerCase();
    const matchSearch = words.length === 0 || words.every(w => searchable.includes(w));

    return matchFilter && matchSearch;
  });

  const sortOrder = { easy: 0, 'medium-easy': 1, medium: 2 };
  if (sort === 'easy-first') filtered.sort((a, b) => sortOrder[a.d] - sortOrder[b.d]);
  else if (sort === 'hard-first') filtered.sort((a, b) => sortOrder[b.d] - sortOrder[a.d]);
  else if (sort === 'rpm-first') filtered.sort((a, b) => (a.rpm === 'high' ? -1 : 1));
  else if (sort === 'az') filtered.sort((a, b) => a.t.localeCompare(b.t));

  document.getElementById('count-num').textContent = filtered.length;

  const diffMap = {
    easy: ['b-easy', 'Easy'],
    'medium-easy': ['b-medeasy', 'Medium Easy'],
    medium: ['b-medium', 'Medium']
  };

  const grid = document.getElementById('grid');

  if (filtered.length === 0) {
    grid.innerHTML = `<div class="no-results">No ideas matched "<strong>${rawQ}</strong>" — try a different keyword.</div>`;
    return;
  }

  grid.innerHTML = filtered.map((idea, i) => {
    const [dc, dl] = diffMap[idea.d];
    const rpmBadge = idea.rpm === 'high'
      ? `<span class="badge b-rpm">High RPM</span>`
      : `<span class="badge b-midrpm">Mid RPM</span>`;
    const aiBadge = idea.ai ? `<span class="badge b-ai">AI</span>` : '';
    return `<div class="card">
      <div class="card-top">
        <span class="card-num">#${String(i+1).padStart(3,'0')}</span>
        <span class="card-title">${idea.t}</span>
      </div>
      <div class="card-badges">
        <span class="badge ${dc}">${dl}</span>
        ${rpmBadge}${aiBadge}
      </div>
      <div class="card-desc">${idea.desc}</div>
    </div>`;
  }).join('');
}

render();
</script>
